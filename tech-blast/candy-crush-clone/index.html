<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpg" href="images/pig.png" />
  <title>TECH BLAST V.3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="content">
    <div id="board"></div>
    <div id="instructions">
      <h2>Cara Bermain</h2>
      <ul>
        <li>Cocokkan 3 karakter untuk mendapatkan poin!</li>
        <li>Geser karakter untuk membuat barisan horizontal atau vertikal. </li>
        <li>Selesaikan misi untuk naik ke level berikutnya. </li>
      </ul>
      <div id="control-div">
        <div id="info-div">
          <div id="level-div" class="information-container">
            <p id="level-p"></p>
            <p id="level"></p>
          </div>
          <div id="moves-div" class="information-container">
            <p id="moves-p"></p>
            <p id="moves"></p>
          </div>
          <div id="candies-div" class="information-container">
            <div id="candy"></div>
            <p id="candies-p"></p>
            <p id="candies"></p>
          </div>
        </div>
        <div id="button"></div>
      </div>
    </div>
    <script src="levels.js"></script>
    <script src="script2.js"></script>
</body>

</html>
