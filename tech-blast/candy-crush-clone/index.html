<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/jpg" href="images/pig.png" />
  <title>TECH BLAST V.3</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="content">
    <div style="
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
      ">
      <div id="instructions">
        <div id="control-div">
          <div id="info-div">
            <div id="level-div" class="information-container">
              <p id="level-p">Tekan</p>
              <p style="margin-left: 0.5em;" id="level">Start!</p>
            </div>
            <div id="moves-div" class="information-container">
              <p id="moves-p">Untuk</p>
              <p style="margin-left: 0.5em;" id="moves">memulai</p>
            </div>
            <div id="candies-div" class="information-container">
              <div id="candy"></div>
              <p id="candies-p">&nbsp;&nbsp;&nbsp;</p>
              <p id="candies">Game</p>
            </div>
          </div>

        </div>
      </div>
    </div>
    <div style="flex: 1">
      <div id="board"></div>
    </div>
    <div style="flex: 1"></div>
    <div style="
      position: absolute;
      /* background-color: red; */
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    ">
      <!-- <div id="button"></div> -->
      <div style="
        background-color: white;
        border-radius: 1em;
        overflow: hidden;
        padding: 1em;
        display: flex;
        flex-direction: column;
      ">
        <p style="
          font-size: 4em;
          font-family: Arial, Helvetica, sans-serif;
          font-weight: 700;
          line-height: 0;
        ">Hmm?</p>
        <div style="
          display: flex;
          flex-direction: row;
        ">
          <button style="
            font-size: 2em;
            padding: 0.25em 1em 0.25em 1em;
            border-radius: 0.5em;
            background-color: #ace725;
            border-style: none;
          ">
            Mulai Lagi
          </button>
          <div style="width: 1em"></div>
          <button style="
            font-size: 2em;
            padding: 0.25em 1em 0.25em 1em;
            border-radius: 0.5em;
            background-color: #ace725;
            border-style: none;
          ">
            Keluar
          </button>
        </div>
      </div>
    </div>
    <script src="levels.js"></script>
    <script src="script2.js"></script>
</body>

</html>
