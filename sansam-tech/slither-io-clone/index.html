<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsan Tech Snakes</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('images/Map2.png'); /* Sesuaikan dengan background game */
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.5); /* Efek transparan */
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.7);
        }

        h1 {
            color: #ff9900;
            font-size: 50px;
            margin-bottom: 20px;
        }

        p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #ff9900;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .start-btn:hover {
            background-color: #e68a00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Samsan Tech Snakes</h1>
        <p>Bantu Ular kamu untuk makan dan berkembang, lalu bunuh ular lain untuk bertahan hidup.</p>
        <button class="start-btn" onclick="startGame()">Ayoo Mulai!</button>
    </div>

    <script>
        function startGame() {
            window.location.href = 'game.html'; // Alihkan ke halaman game utama
        }
    </script>
</body>
</html>
